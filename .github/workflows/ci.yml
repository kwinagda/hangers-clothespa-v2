name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hangers-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hangers
          POSTGRES_PASSWORD: hangers
          POSTGRES_DB: hangers_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://hangers:hangers@localhost:5432/hangers_test
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hangers-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --force-reset

      - name: Run tests
        run: npm test

  crm:
    name: CRM — type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hangers-crm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hangers-crm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001/api/v1
