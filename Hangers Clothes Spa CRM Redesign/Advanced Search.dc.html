<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #f7f9fc; font-family: var(--crm-font-ui); }

  .main { max-width: 1100px; margin: 0 auto; padding: 30px 36px 60px; }
  .title { font-family: var(--crm-font-display); font-weight: 800; font-size: 26px; color: #023c62; margin-bottom: 20px; }
  .tabs { display: flex; gap: 4px; background: #eef2f6; border-radius: 11px; padding: 4px; width: fit-content; margin-bottom: 18px; }
  .tab { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #6b7fa3; cursor: pointer; }
  .tab.active { background: #fff; color: #023c62; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .panel { background: #fff; border: 1px solid #e3edf6; border-radius: 14px; padding: 20px; margin-bottom: 18px; }
  .input { width: 100%; border: 1.5px solid #dce8f0; border-radius: 9px; padding: 11px 14px; font-size: 13.5px; font-family: var(--crm-font-ui); margin-bottom: 12px; }
  .filter-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .select { border: 1.5px solid #dce8f0; border-radius: 9px; padding: 9px 12px; font-size: 13px; font-family: var(--crm-font-ui); color: #1a2332; }
  .btn { padding: 10px 22px; border-radius: 9px; font-size: 13.5px; font-weight: 700; border: none; cursor: pointer; font-family: var(--crm-font-ui); }
  .btn-primary { background: #023c62; color: #fff; }
  .btn-ghost { background: #fff; color: #3d5470; border: 1.5px solid #dce8f0; }
  .table { width: 100%; border-collapse: collapse; }
  .table th { text-align: left; font-size: 10.5px; font-weight: 700; color: #6b7fa3; letter-spacing: 0.07em; text-transform: uppercase; padding: 11px 18px; border-bottom: 1px solid #e8f0f7; background: #f7f9fc; }
  .table td { padding: 12px 18px; font-size: 13.5px; color: #1a2332; border-bottom: 1px solid #eef4f8; }
  .table tr:last-child td { border-bottom: none; }
</style>
