<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet data-dc-atomics>
<link rel="stylesheet" href="_ds/hangers-crm-design-system-68e80ff6-61ab-4f72-9ea5-facbb2cc753c/_ds_bundle.css">
<link rel="stylesheet" href="_ds/hangers-crm-design-system-68e80ff6-61ab-4f72-9ea5-facbb2cc753c/styles.css">
<script src="_ds/hangers-crm-design-system-68e80ff6-61ab-4f72-9ea5-facbb2cc753c/_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { min-height: 100vh; background: #023c62; font-family: var(--crm-font-ui); display: flex; align-items: center; justify-content: center; }
  a { color: #035a8f; } a:hover { color: #023c62; }
  .login-card { width: 400px; background: #fff; border-radius: 16px; padding: 40px 36px 34px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
  .login-logo { display: flex; justify-content: center; margin-bottom: 22px; }
  .login-logo img { height: 40px; object-fit: contain; }
  .login-title { text-align: center; font-family: var(--crm-font-display); font-weight: 700; font-size: 19px; color: #142033; margin-bottom: 4px; }
  .login-sub { text-align: center; font-size: 13px; color: #6b7fa3; margin-bottom: 28px; }
  .login-field { margin-bottom: 16px; }
  .login-label { font-size: 12.5px; font-weight: 600; color: #3d5470; margin-bottom: 7px; display: block; }
  .login-input { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; border: 1.5px solid #dce8f0; background: #fff; }
  .login-input input { border: none; outline: none; font-size: 14px; color: #1a2332; width: 100%; font-family: var(--crm-font-ui); }
  .login-btn { width: 100%; padding: 13px; border-radius: 10px; background: #023c62; color: #fff; font-size: 14.5px; font-weight: 700; border: none; margin-top: 8px; cursor: pointer; font-family: var(--crm-font-ui); }
  .login-foot { text-align: center; font-size: 12px; color: #9dafc8; margin-top: 22px; }
</style>
</helmet>

<div class="login-card">
  <div class="login-logo">
    <img src="https://wadashboardapi.161apps.com/media-file/406df8a3-4651-46d8-9e0b-9ee9aa3b0173/Hangers%20logo%20unit%20transparent.png" alt="Hangers Clothes Spa">
  </div>
  <div class="login-title">Hangers CRM</div>
  <div class="login-sub">Sign in to manage orders and customers</div>

  <div class="login-field">
    <label class="login-label">Phone Number</label>
    <div class="login-input">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9dafc8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6a2 2 0 0 1 2-2h2l2 5-2 1.4a11 11 0 0 0 5.6 5.6L15 14l5 2v2a2 2 0 0 1-2 2A15 15 0 0 1 4 6z"/></svg>
      <input placeholder="+91 98765 43210">
    </div>
  </div>
  <div class="login-field">
    <label class="login-label">Password</label>
    <div class="login-input">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9dafc8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="9.5" rx="2"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>
      <input type="password" placeholder="••••••••">
    </div>
  </div>

  <button class="login-btn">Sign In</button>
  <div class="login-foot">Forgot password? Contact your manager.</div>
</div>

</x-dc>
</body>
</html>
