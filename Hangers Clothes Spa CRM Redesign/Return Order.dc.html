<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #f7f9fc; font-family: var(--crm-font-ui); }
  a { color: #035a8f; text-decoration: none; } a:hover { color: #023c62; }
  .main { max-width: 520px; margin: 0 auto; padding: 30px 36px 60px; }
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7fa3; margin-bottom: 18px; font-weight: 600; }
  .back:hover { color: #023c62; }
  .title { font-family: var(--crm-font-display); font-weight: 800; font-size: 24px; color: #023c62; margin-bottom: 22px; }
  .panel { background: #fff; border: 1px solid #e3edf6; border-radius: 14px; padding: 22px; }
  .label { font-size: 12px; font-weight: 600; color: #3d5470; margin-bottom: 7px; display: block; }
  .field { margin-bottom: 16px; }
  .input, .select { width: 100%; border: 1.5px solid #dce8f0; border-radius: 9px; padding: 10px 13px; font-size: 13.5px; font-family: var(--crm-font-ui); color: #1a2332; }
  .input.mono { font-family: var(--crm-font-mono); }
  .notice { background: #fefce8; border-radius: 9px; padding: 12px 14px; font-size: 13px; color: #854d0e; margin-bottom: 16px; }
  .submit-btn { width: 100%; padding: 12px; background: #023c62; color: #fff; border-radius: 9px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--crm-font-ui); }
</style>

<div class="main">

    Back
  </a>
  <div class="title">Return / Re-clean Order</div>

  <div class="panel">
    <div class="field">
      <label class="label">Original Order ID *</label>
      <input class="input mono" placeholder="e.g. HG-2144">
    </div>
    <div class="field">
      <label class="label">Reason *</label>
      <select class="select">
        <option>Stain not removed</option>
        <option>Damaged garment</option>
        <option>Wrong item delivered</option>
        <option>Other</option>
      </select>
    </div>

    <button class="submit-btn">Create Return Order</button>
  </div>
</div>
